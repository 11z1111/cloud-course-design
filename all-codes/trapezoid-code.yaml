apiVersion: v1
data:
  trapezoid_mpi_full_comment.py: "#!/usr/bin/env python3\n\"\"\"\n梯形法数值积分 - MPI 并行版\n使用
    Scatter 分发子区间，Reduce 求和\n计算 ∫(x^2) dx from a to b\n\"\"\"\n\nfrom mpi4py import
    MPI\n\ndef f(x):\n    \"\"\"被积函数 f(x) = x^2\"\"\"\n    return x * x\n\ndef trapezoidal_serial(a,
    b, n):\n    \"\"\"单个进程的局部积分计算（梯形法）\"\"\"\n    h = (b - a) / n\n    integral =
    (f(a) + f(b)) / 2.0\n    for i in range(1, n):\n        x = a + i * h\n        integral
    += f(x)\n    integral *= h\n    return integral\n\nif __name__ == \"__main__\":\n
    \   # ============================================================\n    # MPI
    通信原语1：MPI.COMM_WORLD - 获取全局通信域\n    # ============================================================\n
    \   # 作用：获取 MPI 默认通信域，包含所有进程\n    # 数据流向：无数据传输，初始化 MPI 环境\n    # ============================================================\n
    \   comm = MPI.COMM_WORLD\n    \n    # ============================================================\n
    \   # MPI 通信原语2：comm.Get_rank() - 获取当前进程编号\n    # ============================================================\n
    \   # 作用：返回当前进程在通信域中的唯一标识符\n    # 数据流向：本地操作，无跨进程通信\n    # ============================================================\n
    \   rank = comm.Get_rank()\n    \n    # ============================================================\n
    \   # MPI 通信原语3：comm.Get_size() - 获取总进程数\n    # ============================================================\n
    \   # 作用：返回通信域中的总进程数量\n    # 数据流向：本地操作，无跨进程通信\n    # ============================================================\n
    \   size = comm.Get_size()\n    \n    # 全局参数\n    a, b = 0.0, 1.0          # 积分区间
    [0, 1]\n    n_total = 1000000        # 总子区间数\n    \n    # ============================================================\n
    \   # MPI 通信原语4：Scatter（隐式实现）- 分发子区间\n    # ============================================================\n
    \   # 作用：将全局区间 [a, b] 均匀分割成 size 份，每个进程获得一份\n    # 数据流向：每个进程根据 rank 自动计算自己的子区间起止点\n
    \   #   rank0: [0.00, 0.25)\n    #   rank1: [0.25, 0.50)\n    #   rank2: [0.50,
    0.75)\n    #   rank3: [0.75, 1.00]\n    # ============================================================\n
    \   h_global = (b - a) / size           # 每个进程的区间宽度\n    local_a = a + rank *
    h_global       # 本进程的区间起点\n    local_b = local_a + h_global        # 本进程的区间终点\n
    \   \n    local_n = n_total // size           # 每个进程的子区间数\n    if rank == size
    - 1:                # 最后一个进程处理余数\n        local_n = n_total - (size - 1) * local_n\n
    \   \n    # ============================================================\n    #
    局部计算（无通信）\n    # ============================================================\n
    \   # 每个进程独立计算自己子区间的积分\n    # 数据流向：无跨进程通信，各自独立计算\n    # ============================================================\n
    \   local_integral = trapezoidal_serial(local_a, local_b, local_n)\n    \n    #
    ============================================================\n    # MPI 通信原语5：comm.reduce()
    - 归约求和\n    # ============================================================\n    #
    作用：将所有进程的 local_integral 通过求和操作归约到 root 进程\n    # op=MPI.SUM: 归约操作类型（求和）\n    #
    root=0: 目标进程编号（结果汇总到进程0）\n    #\n    # 数据流向：\n    #   进程0: local_integral ──┐\n
    \   #   进程1: local_integral ──┼──→ 进程0\n    #   进程2: local_integral ──┤      total_integral
    = sum(all)\n    #   进程3: local_integral ──┘\n    # ============================================================\n
    \   total_integral = comm.reduce(local_integral, op=MPI.SUM, root=0)\n    \n    #
    ============================================================\n    # 结果输出（仅 root
    进程）\n    # ============================================================\n    if
    rank == 0:\n        print(f\"并行版: ∫({a}→{b}) x^2 dx = {total_integral:.11f}\")\n"
